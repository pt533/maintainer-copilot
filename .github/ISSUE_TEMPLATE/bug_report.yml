name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please provide enough detail for reproduction.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: The CLI returns an unexpected label suggestion
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps
      placeholder: |
        1. Run ...
        2. Use this issue file ...
        3. See error/output ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, package version or commit SHA
      placeholder: Ubuntu 24.04, Python 3.12, main
