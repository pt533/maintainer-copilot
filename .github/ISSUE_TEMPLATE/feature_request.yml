name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.
        Please explain the maintainer workflow problem you want to solve.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer pain point does this address?
      placeholder: Reviewing repetitive issues takes too much time
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, sample output, or related tools
